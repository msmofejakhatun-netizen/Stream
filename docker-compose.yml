version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
      - "1935:1935" # RTMP streaming input
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://stream:play@db:5432/streamplay
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=streamplay-production-ready-jwt-secret-key-2026
      - SERVER_HOST_URL=https://streamplay.example.com
    volumes:
      - uploads_data:/app/public/uploads
      - logs_data:/app/logs
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=stream
      - POSTGRES_PASSWORD=play
      - POSTGRES_DB=streamplay
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

volumes:
  pg_data:
  uploads_data:
  logs_data:
