<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamPlay Admin Hub</title>
  
  <!-- CSS Tailwind & Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Tailwind Custom Configuration -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            brand: {
              primary: '#FF2A54',    // StreamPlay Red/Neon Pink
              secondary: '#1A1D29',  // Deep Slate/Blue Gray
              accent: '#00F2FE',     // Neon Cyan
              purple: '#7928CA',     // Glass Purple
              card: 'rgba(26, 29, 41, 0.65)',
            }
          },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
            'neon-red': '0 0 15px rgba(255, 42, 84, 0.4)',
            'neon-cyan': '0 0 15px rgba(0, 242, 254, 0.4)',
          }
        }
      }
    }
  </script>

  <style>
    body {
      background: radial-gradient(125% 125% at 50% 10%, #0c0d14 40%, #1f0813 80%, #05141d 100%);
      min-height: 100vh;
      color: #F3F4F6;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow-x: hidden;
    }
    .glass-panel {
      background: rgba(22, 24, 37, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .glass-input {
      background: rgba(10, 11, 18, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
    }
    .glass-input:focus {
      border-color: #FF2A54;
      box-shadow: 0 0 10px rgba(255, 42, 84, 0.2);
      outline: none;
    }
    /* Scrollbar Style */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 42, 84, 0.4);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 42, 84, 0.7);
    }
  </style>

  <!-- React 18, ReactDOM 18 & Babel via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Chart.js for Gorgeous Analytics Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div id="root"></div>

  <!-- React Application Core Logic -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      // 1. Session & Auth State
      const [token, setToken] = useState(localStorage.getItem('admin_token') || '');
      const [user, setUser] = useState(JSON.parse(localStorage.getItem('admin_user')) || null);
      
      // 2. Navigation State
      const [activeTab, setActiveTab] = useState('dashboard');
      
      // 3. UI Control States
      const [loading, setLoading] = useState(false);
      const [alert, setAlert] = useState(null);

      // 4. Data states
      const [dashboardData, setDashboardData] = useState(null);
      const [videos, setVideos] = useState([]);
      const [totalVideos, setTotalVideos] = useState(0);
      const [videoPage, setVideoPage] = useState(1);
      const [videoSearch, setVideoSearch] = useState('');
      const [videoFilterShort, setVideoFilterShort] = useState('all');
      
      const [categories, setCategories] = useState([]);
      const [users, setUsers] = useState([]);
      const [totalUsers, setTotalUsers] = useState(0);
      const [userPage, setUserPage] = useState(1);
      const [userSearch, setUserSearch] = useState('');
      
      const [comments, setComments] = useState([]);
      const [r2Files, setR2Files] = useState([]);
      const [banners, setBanners] = useState([]);
      const [notifications, setNotifications] = useState([]);
      const [auditLogs, setAuditLogs] = useState([]);
      const [appSettings, setAppSettings] = useState({});
      const [monetization, setMonetization] = useState({});

      // Modals and form payloads
      const [showMediaModal, setShowMediaModal] = useState(false);
      const [editingMedia, setEditingMedia] = useState(null);
      const [mediaForm, setMediaForm] = useState({
        title: '', description: '', videoUrl: '', thumbnailUrl: '',
        category: 'Education', duration: '03:15', isShort: false,
        isFeatured: false, isTrending: false, isPublished: true, scheduledTime: ''
      });

      const [showCatModal, setShowCatModal] = useState(false);
      const [catForm, setCatForm] = useState({ id: '', name: '', genre: 'General', language: 'English' });

      const [showBannerModal, setShowBannerModal] = useState(false);
      const [bannerForm, setBannerForm] = useState({ title: '', imageUrl: '', type: 'carousel', targetVideoId: '' });

      const [notifForm, setNotifForm] = useState({ title: '', message: '', type: 'broadcast', targetUserId: '', scheduledTime: '' });

      const [r2UploadFile, setR2UploadFile] = useState(null);
      const [previewAsset, setPreviewAsset] = useState(null); // URL of R2 file to preview

      // Refs for Charts
      const viewsChartRef = useRef(null);
      const viewsChartInstance = useRef(null);

      // Auto Alert Clear
      const triggerAlert = (type, message) => {
        setAlert({ type, message });
        setTimeout(() => setAlert(null), 5000);
      };

      // Headers Builder
      const getHeaders = () => ({
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      });

      // API Caller Helper
      const apiCall = async (url, method = 'GET', body = null, isMultipart = false) => {
        setLoading(true);
        try {
          const options = { method };
          if (isMultipart) {
            options.body = body;
            options.headers = { 'Authorization': `Bearer ${token}` };
          } else {
            options.headers = getHeaders();
            if (body) options.body = JSON.stringify(body);
          }

          const res = await fetch(url, options);
          const data = await res.json();
          
          if (!res.ok) {
            if (res.status === 401 || res.status === 403) {
              logout();
              throw new Error(data.error || 'Session expired or privileges revoked.');
            }
            throw new Error(data.error || 'Server request failed');
          }
          setLoading(false);
          return data;
        } catch (err) {
          setLoading(false);
          triggerAlert('error', err.message);
          throw err;
        }
      };

      // Auth Handlers
      const login = async (email, password) => {
        try {
          const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Login failed');
          
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_user', JSON.stringify(data.user));
          setToken(data.token);
          setUser(data.user);
          triggerAlert('success', `Welcome back, ${data.user.displayName}!`);
        } catch (err) {
          triggerAlert('error', err.message);
        }
      };

      const logout = () => {
        localStorage.removeItem('admin_token');
        localStorage.removeItem('admin_user');
        setToken('');
        setUser(null);
      };

      // Loaders
      const loadDashboard = async () => {
        const data = await apiCall('/api/admin/dashboard');
        if (data) {
          setDashboardData(data);
          drawCharts(data.charts);
        }
      };

      const loadVideos = async () => {
        let url = `/api/admin/videos?page=${videoPage}&limit=10&search=${videoSearch}`;
        if (videoFilterShort !== 'all') url += `&is_short=${videoFilterShort === 'shorts'}`;
        const data = await apiCall(url);
        if (data) {
          setVideos(data.videos);
          setTotalVideos(data.total);
        }
      };

      const loadCategories = async () => {
        const data = await apiCall('/api/admin/categories');
        if (data) setCategories(data);
      };

      const loadUsers = async () => {
        const data = await apiCall(`/api/admin/users?page=${userPage}&limit=10&search=${userSearch}`);
        if (data) {
          setUsers(data.users);
          setTotalUsers(data.total);
        }
      };

      const loadComments = async () => {
        const data = await apiCall('/api/admin/comments');
        if (data) setComments(data);
      };

      const loadR2Files = async () => {
        const data = await apiCall('/api/admin/r2/files');
        if (data) setR2Files(data);
      };

      const loadBanners = async () => {
        const data = await apiCall('/api/admin/banners');
        if (data) setBanners(data);
      };

      const loadNotifications = async () => {
        const data = await apiCall('/api/admin/notifications');
        if (data) setNotifications(data);
      };

      const loadAuditLogs = async () => {
        const data = await apiCall('/api/admin/audit-logs');
        if (data) setAuditLogs(data.logs);
      };

      const loadSettings = async () => {
        const appS = await apiCall('/api/admin/settings');
        const monS = await apiCall('/api/admin/monetization');
        if (appS) setAppSettings(appS);
        if (monS) setMonetization(monS);
      };

      // Draw dashboard visual graphs using chart.js
      const drawCharts = (chartData) => {
        if (!viewsChartRef.current) return;
        
        if (viewsChartInstance.current) {
          viewsChartInstance.current.destroy();
        }

        const ctx = viewsChartRef.current.getContext('2d');
        
        // Custom neon gradients
        const regGradient = ctx.createLinearGradient(0, 0, 0, 300);
        regGradient.addColorStop(0, 'rgba(255, 42, 84, 0.4)');
        regGradient.addColorStop(1, 'rgba(255, 42, 84, 0.01)');

        const viewGradient = ctx.createLinearGradient(0, 0, 0, 300);
        viewGradient.addColorStop(0, 'rgba(0, 242, 254, 0.4)');
        viewGradient.addColorStop(1, 'rgba(0, 242, 254, 0.01)');

        viewsChartInstance.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels: chartData.labels,
            datasets: [
              {
                label: 'OTT Streams & Views',
                data: chartData.views,
                borderColor: '#00F2FE',
                backgroundColor: viewGradient,
                fill: true,
                tension: 0.4,
                borderWidth: 3,
                pointBackgroundColor: '#00F2FE',
              },
              {
                label: 'New Member Registrations',
                data: chartData.registrations.map(r => r * 150), // visual scaling factor
                borderColor: '#FF2A54',
                backgroundColor: regGradient,
                fill: true,
                tension: 0.4,
                borderWidth: 3,
                pointBackgroundColor: '#FF2A54',
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: '#D1D5DB', font: { family: 'Plus Jakarta Sans' } }
              }
            },
            scales: {
              x: {
                grid: { color: 'rgba(255, 255, 255, 0.05)' },
                ticks: { color: '#9CA3AF' }
              },
              y: {
                grid: { color: 'rgba(255, 255, 255, 0.05)' },
                ticks: { color: '#9CA3AF' }
              }
            }
          }
        });
      };

      // Lifecycle hooks to refresh pages on tab changes
      useEffect(() => {
        if (!token) return;
        
        if (activeTab === 'dashboard') loadDashboard();
        else if (activeTab === 'videos') { loadVideos(); loadCategories(); }
        else if (activeTab === 'categories') loadCategories();
        else if (activeTab === 'users') loadUsers();
        else if (activeTab === 'comments') loadComments();
        else if (activeTab === 'r2') loadR2Files();
        else if (activeTab === 'banners') loadBanners();
        else if (activeTab === 'notifications') loadNotifications();
        else if (activeTab === 'settings') loadSettings();
        else if (activeTab === 'security') loadAuditLogs();
        
        // Trigger icons refresh
        setTimeout(() => lucide.createIcons(), 200);
      }, [token, activeTab, videoPage, videoSearch, videoFilterShort, userPage, userSearch]);

      // Handle Media Add/Edit Actions
      const handleSaveMedia = async (e) => {
        e.preventDefault();
        try {
          if (editingMedia) {
            await apiCall(`/api/admin/videos/${editingMedia.id}`, 'PUT', mediaForm);
            triggerAlert('success', 'Media updated successfully!');
          } else {
            await apiCall('/api/admin/videos', 'POST', mediaForm);
            triggerAlert('success', 'New media published successfully!');
          }
          setShowMediaModal(false);
          setEditingMedia(null);
          loadVideos();
        } catch (err) {}
      };

      const handleEditMedia = (video) => {
        setEditingMedia(video);
        setMediaForm({
          title: video.title,
          description: video.description || '',
          videoUrl: video.video_url,
          thumbnailUrl: video.thumbnail_url,
          category: video.category,
          duration: video.duration,
          isShort: video.is_short,
          isFeatured: video.is_featured,
          isTrending: video.is_trending,
          isPublished: video.is_published,
          scheduledTime: video.scheduled_time || ''
        });
        setShowMediaModal(true);
      };

      const handleDeleteMedia = async (id) => {
        if (!confirm('Are you absolutely sure you want to permanently delete this video?')) return;
        try {
          await apiCall(`/api/admin/videos/${id}`, 'DELETE');
          triggerAlert('success', 'Video deleted successfully');
          loadVideos();
        } catch (err) {}
      };

      // Categories Helpers
      const handleSaveCategory = async (e) => {
        e.preventDefault();
        try {
          if (catForm.id) {
            await apiCall(`/api/admin/categories/${catForm.id}`, 'PUT', catForm);
            triggerAlert('success', 'Category updated successfully');
          } else {
            await apiCall('/api/admin/categories', 'POST', catForm);
            triggerAlert('success', 'Category added successfully');
          }
          setShowCatModal(false);
          loadCategories();
        } catch (err) {}
      };

      const handleDeleteCategory = async (id) => {
        if (!confirm('Delete this category?')) return;
        try {
          await apiCall(`/api/admin/categories/${id}`, 'DELETE');
          triggerAlert('success', 'Category deleted');
          loadCategories();
        } catch (err) {}
      };

      // Users flags toggles (Ban, Verify, Premium, Change Role)
      const handleUpdateUserFlag = async (userId, flags) => {
        try {
          await apiCall(`/api/admin/users/${userId}`, 'PUT', flags);
          triggerAlert('success', 'User status updated successfully');
          loadUsers();
        } catch (err) {}
      };

      // Comments Actions
      const handleApproveComment = async (id) => {
        try {
          await apiCall(`/api/admin/comments/${id}/approve`, 'PUT');
          triggerAlert('success', 'Comment approved & flagged states cleared');
          loadComments();
        } catch (err) {}
      };

      const handleDeleteComment = async (id) => {
        if (!confirm('Delete comment?')) return;
        try {
          await apiCall(`/api/admin/comments/${id}`, 'DELETE');
          triggerAlert('success', 'Comment deleted');
          loadComments();
        } catch (err) {}
      };

      // Cloudflare R2 direct uploads
      const handleR2Upload = async (e) => {
        e.preventDefault();
        if (!r2UploadFile) return;
        const formData = new FormData();
        formData.append('file', r2UploadFile);

        try {
          await apiCall('/api/admin/r2/upload', 'POST', formData, true);
          triggerAlert('success', 'Uploaded to Cloudflare R2 successfully!');
          setR2UploadFile(null);
          loadR2Files();
        } catch (err) {}
      };

      const handleR2Delete = async (key) => {
        if (!confirm(`Delete key ${key} permanently from Cloudflare R2?`)) return;
        try {
          await apiCall(`/api/admin/r2/delete?key=${encodeURIComponent(key)}`, 'DELETE');
          triggerAlert('success', 'Object deleted from R2');
          loadR2Files();
        } catch (err) {}
      };

      // Banners
      const handleSaveBanner = async (e) => {
        e.preventDefault();
        try {
          await apiCall('/api/admin/banners', 'POST', bannerForm);
          triggerAlert('success', 'Banner published');
          setShowBannerModal(false);
          loadBanners();
        } catch (err) {}
      };

      const handleDeleteBanner = async (id) => {
        if (!confirm('Delete banner?')) return;
        try {
          await apiCall(`/api/admin/banners/${id}`, 'DELETE');
          triggerAlert('success', 'Banner deleted');
          loadBanners();
        } catch (err) {}
      };

      // Notifications
      const handleSendNotification = async (e) => {
        e.preventDefault();
        try {
          await apiCall('/api/admin/notifications', 'POST', notifForm);
          triggerAlert('success', 'Notification dispatched successfully');
          setNotifForm({ title: '', message: '', type: 'broadcast', targetUserId: '', scheduledTime: '' });
          loadNotifications();
        } catch (err) {}
      };

      // Settings updates
      const handleSaveGlobalSettings = async (e) => {
        e.preventDefault();
        try {
          await apiCall('/api/admin/settings', 'POST', appSettings);
          triggerAlert('success', 'Global app parameters updated');
        } catch (err) {}
      };

      const handleSaveMonSettings = async (e) => {
        e.preventDefault();
        try {
          await apiCall('/api/admin/monetization', 'POST', monetization);
          triggerAlert('success', 'AdMob and monetization parameters updated');
        } catch (err) {}
      };

      // Initialize icons on mount
      useEffect(() => {
        lucide.createIcons();
      }, []);

      // LOGIN CONTAINER IF UNAUTHENTICATED
      if (!token) {
        return (
          <div className="flex items-center justify-center min-h-screen px-4">
            <div className="w-full max-w-md glass-panel p-8 rounded-3xl shadow-glass border border-white/10 text-center relative overflow-hidden">
              <div className="absolute top-0 left-0 w-32 h-32 bg-brand-primary/20 rounded-full blur-2xl"></div>
              <div className="absolute bottom-0 right-0 w-32 h-32 bg-brand-accent/20 rounded-full blur-2xl"></div>
              
              <div className="relative z-10">
                <div className="w-16 h-16 bg-brand-primary rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-neon-red">
                  <i data-lucide="play" className="text-white w-8 h-8 fill-white"></i>
                </div>
                <h1 className="text-3xl font-extrabold text-white mb-2 tracking-tight">StreamPlay Admin</h1>
                <p className="text-gray-400 mb-8 text-sm">Sign in to access your secure media dashboard</p>

                {alert && (
                  <div className={`p-4 mb-6 rounded-2xl text-sm ${alert.type === 'error' ? 'bg-red-500/10 text-red-400 border border-red-500/20' : 'bg-green-500/10 text-green-400 border border-green-500/20'}`}>
                    {alert.message}
                  </div>
                )}

                <form onSubmit={(e) => {
                  e.preventDefault();
                  login(e.target.email.value, e.target.password.value);
                }} className="space-y-4 text-left">
                  <div>
                    <label className="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Secure Email</label>
                    <input name="email" type="email" placeholder="admin@streamplay.com" required className="w-full px-4 py-3 rounded-2xl glass-input text-sm" />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Password</label>
                    <input name="password" type="password" placeholder="••••••••" required className="w-full px-4 py-3 rounded-2xl glass-input text-sm" />
                  </div>
                  <button type="submit" className="w-full mt-4 py-3.5 bg-brand-primary hover:bg-brand-primary/90 text-white font-bold rounded-2xl transition duration-300 shadow-neon-red text-sm">
                    Authenticate Administrator
                  </button>
                </form>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen overflow-hidden">
          {/* SIDEBAR NAVIGATION */}
          <aside className="w-72 bg-brand-secondary/90 border-r border-white/5 flex flex-col justify-between overflow-y-auto hidden md:flex">
            <div className="p-6">
              <div className="flex items-center gap-3 mb-8">
                <div className="w-10 h-10 bg-brand-primary rounded-xl flex items-center justify-center">
                  <i data-lucide="play" className="text-white w-5 h-5 fill-white"></i>
                </div>
                <div>
                  <h2 className="font-extrabold text-white text-md tracking-tight">StreamPlay Hub</h2>
                  <span className="text-xs text-brand-accent font-mono font-bold tracking-wider">{user ? user.role : 'Admin'}</span>
                </div>
              </div>

              <nav className="space-y-1">
                {[
                  { id: 'dashboard', label: 'Dashboard', icon: 'grid' },
                  { id: 'videos', label: 'Video Catalog', icon: 'clapperboard' },
                  { id: 'categories', label: 'Genres & Langs', icon: 'tags' },
                  { id: 'users', label: 'User Index', icon: 'users' },
                  { id: 'comments', label: 'Moderation Queue', icon: 'message-square' },
                  { id: 'r2', label: 'Cloudflare R2', icon: 'hard-drive' },
                  { id: 'banners', label: 'Hero Banners', icon: 'image' },
                  { id: 'notifications', label: 'Push Hub', icon: 'bell' },
                  { id: 'settings', label: 'App Settings', icon: 'sliders' },
                  { id: 'security', label: 'Security Logs', icon: 'shield-alert' },
                ].map(item => (
                  <button
                    key={item.id}
                    onClick={() => setActiveTab(item.id)}
                    className={`w-full flex items-center gap-3.5 px-4 py-3 rounded-2xl text-sm font-semibold transition ${
                      activeTab === item.id 
                        ? 'bg-brand-primary text-white shadow-neon-red' 
                        : 'text-gray-400 hover:bg-white/5 hover:text-white'
                    }`}
                  >
                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                    {item.label}
                  </button>
                ))}
              </nav>
            </div>

            <div className="p-6 border-t border-white/5 bg-black/25">
              <div className="flex items-center gap-3 mb-4">
                <img src={user ? user.avatarUrl : 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=120&q=80'} className="w-10 h-10 rounded-full border border-white/10" />
                <div className="overflow-hidden">
                  <h4 className="text-sm font-bold text-white truncate">{user ? user.displayName : 'Super Admin'}</h4>
                  <p className="text-xs text-gray-500 truncate">{user ? user.email : ''}</p>
                </div>
              </div>
              <button onClick={logout} className="w-full py-2.5 bg-white/5 hover:bg-white/10 text-gray-300 font-semibold rounded-xl text-xs transition border border-white/5 flex items-center justify-center gap-2">
                <i data-lucide="log-out" className="w-4 h-4"></i> Sign Out
              </button>
            </div>
          </aside>

          {/* MAIN PAGE AREA */}
          <main className="flex-1 flex flex-col overflow-hidden bg-black/10">
            {/* ALERT NOTIFICATION TOAST */}
            {alert && (
              <div className="fixed top-6 right-6 z-50 animate-bounce">
                <div className={`p-4 rounded-2xl shadow-2xl flex items-center gap-3 ${alert.type === 'error' ? 'bg-red-500 text-white shadow-red-500/30' : 'bg-green-500 text-white shadow-green-500/30'}`}>
                  <i data-lucide={alert.type === 'error' ? 'alert-triangle' : 'check-circle'} className="w-5 h-5"></i>
                  <span className="text-sm font-semibold">{alert.message}</span>
                </div>
              </div>
            )}

            {/* HEADER BAR */}
            <header className="h-20 bg-brand-secondary/40 backdrop-blur-md border-b border-white/5 px-8 flex items-center justify-between z-10">
              <div className="flex items-center gap-3">
                <button className="md:hidden p-2 text-gray-400 hover:text-white" onClick={() => triggerAlert('info', 'Responsive sidebar is active. Expand desktop for maximum density view.')}>

                    </div>
                  </div>
                  <button type="submit" className="w-full mt-4 py-3 bg-brand-primary hover:bg-brand-primary/90 text-white font-bold rounded-xl transition shadow-neon-red">
                    Publish Banner Card
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* MODAL SYSTEM (Asset Preview Dialog) */}
          {previewAsset && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4">
              <div className="w-full max-w-3xl glass-panel p-6 rounded-3xl shadow-glass border border-white/10 relative">
                <button onClick={() => setPreviewAsset(null)} className="absolute top-4 right-4 text-gray-400 hover:text-white z-10 p-2 bg-black/45 rounded-full">
                  <i data-lucide="x" className="w-5 h-5"></i>
                </button>
                
                {previewAsset.endsWith('.mp4') || previewAsset.endsWith('.m3u8') ? (
                  <div className="aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl">
                    <video src={previewAsset} controls autoplay className="w-full h-full"></video>
                  </div>
                ) : (
                  <div className="rounded-2xl overflow-hidden shadow-2xl bg-black flex justify-center items-center max-h-[70vh]">
                    <img src={previewAsset} className="max-w-full max-h-full object-contain" />
                  </div>
                )}
                <div className="mt-4 text-left font-mono text-xs text-gray-400 break-all select-all p-3 bg-black/25 rounded-xl">
                  CDN URL: {previewAsset}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>

</body>
</html>
